name: Generate Weekly Dashboard

on:
  schedule:
    - cron: '0 12 * * 2'   # Every Tuesday at 7 AM CT (12:00 UTC)
  workflow_dispatch:         # Allow manual runs from GitHub UI

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/main.py --output-dir ./site

      - name: Copy latest report as index.html
        run: |
          LATEST=$(ls ./site/amelco-dashboard-*.html | sort | tail -1)
          cp "$LATEST" ./site/index.html
          echo "Deployed: $LATEST"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
